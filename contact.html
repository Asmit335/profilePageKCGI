<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: white;
      }

      video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: rgb(73, 149, 185);
        padding: 15px 30px;
      }

      header h1 {
        margin: 0;
        font-size: 28px;
      }

      nav {
        display: flex;
        gap: 20px;
      }

      nav a {
        color: white;
        text-decoration: none;
        font-weight: bold;
        font-size: 18px;
      }

      nav a:hover {
        color: #00d9ff;
      }

      .contact-container {
        width: 400px;
        margin: 100px auto;
        background: rgba(0, 0, 0, 0.6);
        padding: 30px;
        border-radius: 10px;
        text-align: center;
      }

      .contact-container h2 {
        margin-bottom: 20px;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: none;
        border-radius: 5px;
        font-size: 16px;
      }

      button {
        background-color: rgb(73, 149, 185);
        color: white;
        border: none;
        padding: 12px 20px;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background-color: rgb(50, 120, 150);
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Contact Us</h1>

      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <video src="nepalnature.mp4" autoplay muted loop></video>

    <div class="contact-container">
      <h2>Get In Touch</h2>

      <form>
        <input type="text" placeholder="Enter your name" required />

        <input type="email" placeholder="Enter your email" required />

        <textarea rows="5" placeholder="Write your message" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>
  </body>
</html>
